<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Финансовый Трекер</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--tg-theme-bg-color, #f5f5f5);
      color: var(--tg-theme-text-color, #222);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ШАПКА */
    .header {
      background: var(--tg-theme-header-bg-color, #ffffff);
      padding: 16px;
      text-align: center;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .balance-block {
      margin-top: 8px;
      font-size: 28px;
      font-weight: 800;
    }
    .balance-block.positive { color: #34C759; }
    .balance-block.negative { color: #FF3B30; }
    .balance-label { font-size: 12px; color: #888; margin-top: 2px; }

    /* ВКЛАДКИ */
    .tabs {
      display: flex;
      background: var(--tg-theme-header-bg-color, #fff);
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }
    .tab {
      flex: 1;
      padding: 12px 4px;
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      color: #888;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab.active {
      color: var(--tg-theme-button-color, #007AFF);
      border-bottom-color: var(--tg-theme-button-color, #007AFF);
    }
    .tab-icon { font-size: 18px; display: block; margin-bottom: 2px; }

    /* КОНТЕНТ */
    .page { display: none; padding: 16px; }
    .page.active { display: block; }

    /* КАРТОЧКИ */
    .card {
      background: var(--tg-theme-secondary-bg-color, #fff);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .card-title {
      font-size: 13px;
      color: #888;
      margin-bottom: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ФОРМА */
    .form-group { margin-bottom: 12px; }
    .form-group label { font-size: 13px; color: #888; margin-bottom: 4px; display: block; }
    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.12);
      font-size: 16px;
      background: var(--tg-theme-bg-color, #f5f5f5);
      color: var(--tg-theme-text-color, #222);
      outline: none;
    }
    input:focus, select:focus {
      border-color: var(--tg-theme-button-color, #007AFF);
    }

    /* КНОПКИ */
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.8; }
    .btn-primary {
      background: var(--tg-theme-button-color, #007AFF);
      color: var(--tg-theme-button-text-color, #fff);
    }
    .btn-danger { background: #FF3B30; color: #fff; }
    .btn-row { display: flex; gap: 8px; }
    .btn-row .btn { flex: 1; }

    /* СПИСОК ТРАНЗАКЦИЙ */
    .transaction-item {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .transaction-item:last-child { border-bottom: none; }
    .tx-icon { font-size: 28px; margin-right: 12px; }
    .tx-info { flex: 1; }
    .tx-name { font-size: 15px; font-weight: 600; }
    .tx-date { font-size: 12px; color: #888; margin-top: 2px; }
    .tx-amount { font-size: 16px; font-weight: 700; }
    .tx-amount.income { color: #34C759; }
    .tx-amount.expense { color: #FF3B30; }

    /* ПОДПИСКИ */
    .sub-item {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .sub-item:last-child { border-bottom: none; }
    .sub-icon { font-size: 28px; margin-right: 12px; }
    .sub-info { flex: 1; }
    .sub-name { font-size: 15px; font-weight: 600; }
    .sub-date { font-size: 12px; color: #888; margin-top: 2px; }
    .sub-amount { font-size: 15px; font-weight: 700; color: #FF3B30; }
    .badge-soon {
      background: #FF9500;
      color: #fff;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 6px;
      margin-left: 6px;
    }

    /* АНАЛИТИКА */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .stat-card {
      background: var(--tg-theme-secondary-bg-color, #fff);
      border-radius: 14px;
      padding: 14px;
      text-align: center;
    }
    .stat-value { font-size: 22px; font-weight: 800; margin-top: 4px; }
    .stat-label { font-size: 12px; color: #888; }
    .stat-income { color: #34C759; }
    .stat-expense { color: #FF3B30; }

    /* КАТЕГОРИИ */
    .category-row {
      display: flex;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .category-row:last-child { border-bottom: none; }
    .cat-bar-wrap { flex: 1; margin: 0 10px; height: 6px; background: rgba(0,0,0,0.08); border-radius: 3px; overflow: hidden; }
    .cat-bar { height: 100%; background: var(--tg-theme-button-color, #007AFF); border-radius: 3px; transition: width 0.5s; }
    .cat-name { font-size: 13px; width: 90px; }
    .cat-amount { font-size: 13px; font-weight: 600; min-width: 70px; text-align: right; }

    /* ПУСТОЕ СОСТОЯНИЕ */
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #888;
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { font-size: 15px; }

    /* НИЖНЯЯ НАВИГАЦИЯ */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--tg-theme-header-bg-color, #fff);
      border-top: 1px solid rgba(0,0,0,0.08);
      display: flex;
      z-index: 100;
    }
    .nav-item {
      flex: 1;
      padding: 10px 4px 14px;
      text-align: center;
      cursor: pointer;
      font-size: 10px;
      color: #888;
      transition: color 0.2s;
    }
    .nav-item.active { color: var(--tg-theme-button-color, #007AFF); }
    .nav-icon { font-size: 22px; display: block; margin-bottom: 2px; }

    .month-selector {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 12px;
    }
    .month-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--tg-theme-button-color, #007AFF);
      padding: 4px 8px;
    }
    .month-label { font-size: 16px; font-weight: 600; }
  </style>
</head>
<body>

<!-- ШАПКА -->
<div class="header">
  <h1>💰 Финансовый Трекер</h1>
  <div class="balance-block" id="balanceDisplay">0 ₽</div>
  <div class="balance-label">Баланс за месяц</div>
</div>

<!-- НИЖНЯЯ НАВИГАЦИЯ -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="showPage('transactions')">
    <span class="nav-icon">📋</span>Операции
  </div>
  <div class="nav-item" onclick="showPage('add')">
    <span class="nav-icon">➕</span>Добавить
  </div>
  <div class="nav-item" onclick="showPage('subscriptions')">
    <span class="nav-icon">🔔</span>Подписки
  </div>
  <div class="nav-item" onclick="showPage('analytics')">
    <span class="nav-icon">📊</span>Аналитика
  </div>
</div>

<!-- СТРАНИЦА: ОПЕРАЦИИ -->
<div class="page active" id="page-transactions">
  <div class="month-selector">
    <button class="month-btn" onclick="changeMonth(-1)">‹</button>
    <span class="month-label" id="monthLabel"></span>
    <button class="month-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div id="transactionsList"></div>
</div>

<!-- СТРАНИЦА: ДОБАВИТЬ -->
<div class="page" id="page-add">
  <div class="card">
    <div class="card-title">Новая операция</div>
    <div class="form-group">
      <label>Тип</label>
      <select id="txType">
        <option value="expense">📤 Расход</option>
        <option value="income">📥 Доход</option>
      </select>
    </div>
    <div class="form-group">
      <label>Сумма (₽)</label>
      <input type="number" id="txAmount" placeholder="0" inputmode="decimal"/>
    </div>
    <div class="form-group">
      <label>Категория</label>
      <select id="txCategory">
        <option value="🍕 Еда">🍕 Еда</option>
        <option value="🚗 Транспорт">🚗 Транспорт</option>
        <option value="🏠 Жильё">🏠 Жильё</option>
        <option value="👕 Одежда">👕 Одежда</option>
        <option value="💊 Здоровье">💊 Здоровье</option>
        <option value="🎮 Развлечения">🎮 Развлечения</option>
        <option value="📱 Связь">📱 Связь</option>
        <option value="💼 Зарплата">💼 Зарплата</option>
        <option value="💰 Другое">💰 Другое</option>
      </select>
    </div>
    <div class="form-group">
      <label>Описание (необязательно)</label>
      <input type="text" id="txNote" placeholder="Например: обед в кафе"/>
    </div>
    <div class="form-group">
      <label>Дата</label>
      <input type="date" id="txDate"/>
    </div>
    <button class="btn btn-primary" onclick="addTransaction()">Добавить операцию</button>
  </div>
</div>

<!-- СТРАНИЦА: ПОДПИСКИ -->
<div class="page" id="page-subscriptions">
  <div class="card">
    <div class="card-title">Добавить подписку</div>
    <div class="form-group">
      <label>Название</label>
      <input type="text" id="subName" placeholder="Например: Netflix"/>
    </div>
    <div class="form-group">
      <label>Сумма (₽)</label>
      <input type="number" id="subAmount" placeholder="0" inputmode="decimal"/>
    </div>
    <div class="form-group">
      <label>День списания (1–31)</label>
      <input type="number" id="subDay" placeholder="15" min="1" max="31"/>
    </div>
    <button class="btn btn-primary" onclick="addSubscription()">Добавить</button>
  </div>

  <div class="card">
    <div class="card-title">Мои подписки</div>
    <div id="subscriptionsList"></div>
  </div>
</div>

<!-- СТРАНИЦА: АНАЛИТИКА -->
<div class="page" id="page-analytics">
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Доходы</div>
      <div class="stat-value stat-income" id="totalIncome">0 ₽</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Расходы</div>
      <div class="stat-value stat-expense" id="totalExpense">0 ₽</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Баланс</div>
      <div class="stat-value" id="analyticsBalance">0 ₽</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Подписок/мес</div>
      <div class="stat-value stat-expense" id="totalSubs">0 ₽</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Расходы по категориям</div>
    <div id="categoryChart"></div>
  </div>
</div>

<script>
  // Инициализация Telegram WebApp
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
  }

  // Данные хранятся в localStorage
  let transactions = JSON.parse(localStorage.getItem('ft_transactions') || '[]');
  let subscriptions = JSON.parse(localStorage.getItem('ft_subscriptions') || '[]');

  // Текущий месяц для фильтрации
  let currentDate = new Date();
  let viewYear = currentDate.getFullYear();
  let viewMonth = currentDate.getMonth();

  const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                  'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

  // Установить сегодняшнюю дату в форму
  document.getElementById('txDate').value = currentDate.toISOString().split('T')[0];

  function save() {
    localStorage.setItem('ft_transactions', JSON.stringify(transactions));
    localStorage.setItem('ft_subscriptions', JSON.stringify(subscriptions));
  }

  function fmt(n) {
    return Number(n).toLocaleString('ru-RU') + ' ₽';
  }

  function changeMonth(dir) {
    viewMonth += dir;
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    renderAll();
  }

  function getMonthTransactions() {
    return transactions.filter(t => {
      const d = new Date(t.date);
      return d.getMonth() === viewMonth && d.getFullYear() === viewYear;
    });
  }

  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    const idx = ['transactions','add','subscriptions','analytics'].indexOf(name);
    document.querySelectorAll('.nav-item')[idx].classList.add('active');
    renderAll();
  }

  function addTransaction() {
    const type = document.getElementById('txType').value;
    const amount = parseFloat(document.getElementById('txAmount').value);
    const category = document.getElementById('txCategory').value;
    const note = document.getElementById('txNote').value;
    const date = document.getElementById('txDate').value;

    if (!amount || amount <= 0) {
      alert('Введи сумму!');
      return;
    }
    if (!date) {
      alert('Выбери дату!');
      return;
    }

    transactions.unshift({ id: Date.now(), type, amount, category, note, date });
    save();

    // Очистить форму
    document.getElementById('txAmount').value = '';
    document.getElementById('txNote').value = '';

    renderAll();
    showPage('transactions');

    if (tg) tg.HapticFeedback.notificationOccurred('success');
  }

  function deleteTransaction(id) {
    transactions = transactions.filter(t => t.id !== id);
    save();
    renderAll();
  }

  function addSubscription() {
    const name = document.getElementById('subName').value.trim();
    const amount = parseFloat(document.getElementById('subAmount').value);
    const day = parseInt(document.getElementById('subDay').value);

    if (!name) { alert('Введи название!'); return; }
    if (!amount || amount <= 0) { alert('Введи сумму!'); return; }
    if (!day || day < 1 || day > 31) { alert('Введи день от 1 до 31!'); return; }

    subscriptions.push({ id: Date.now(), name, amount, day });
    save();

    document.getElementById('subName').value = '';
    document.getElementById('subAmount').value = '';
    document.getElementById('subDay').value = '';

    renderAll();
    if (tg) tg.HapticFeedback.notificationOccurred('success');
  }

  function deleteSubscription(id) {
    subscriptions = subscriptions.filter(s => s.id !== id);
    save();
    renderAll();
  }

  function renderTransactions() {
    const list = document.getElementById('transactionsList');
    document.getElementById('monthLabel').textContent = MONTHS[viewMonth] + ' ' + viewYear;

    const monthTx = getMonthTransactions();

    if (monthTx.length === 0) {
      list.innerHTML = `<div class="empty">
        <div class="empty-icon">📭</div>
        <div class="empty-text">Операций за этот месяц нет.<br>Нажми "Добавить" чтобы внести первую!</div>
      </div>`;
      return;
    }

    // Группировка по дате
    const grouped = {};
    monthTx.forEach(t => {
      if (!grouped[t.date]) grouped[t.date] = [];
      grouped[t.date].push(t);
    });

    let html = '';
    Object.keys(grouped).sort((a,b) => b.localeCompare(a)).forEach(date => {
      const d = new Date(date + 'T00:00:00');
      const label = d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
      html += `<div class="card"><div class="card-title">${label}</div>`;
      grouped[date].forEach(t => {
        const sign = t.type === 'income' ? '+' : '-';
        const cls = t.type === 'income' ? 'income' : 'expense';
        const cat = t.category.split(' ')[0];
        html += `<div class="transaction-item">
          <div class="tx-icon">${cat}</div>
          <div class="tx-info">
            <div class="tx-name">${t.category.split(' ').slice(1).join(' ')}${t.note ? ' · ' + t.note : ''}</div>
          </div>
          <div style="text-align:right">
            <div class="tx-amount ${cls}">${sign}${fmt(t.amount)}</div>
            <div style="font-size:11px;color:#ccc;cursor:pointer;margin-top:4px" onclick="deleteTransaction(${t.id})">✕</div>
          </div>
        </div>`;
      });
      html += '</div>';
    });
    list.innerHTML = html;
  }

  function renderSubscriptions() {
    const list = document.getElementById('subscriptionsList');
    if (subscriptions.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">🔕</div><div class="empty-text">Подписок пока нет</div></div>`;
      return;
    }

    const today = new Date().getDate();
    let html = '';
    subscriptions.sort((a,b) => a.day - b.day).forEach(s => {
      const daysLeft = s.day >= today ? s.day - today : 31 - today + s.day;
      const soon = daysLeft <= 3;
      html += `<div class="sub-item">
        <div class="sub-icon">📱</div>
        <div class="sub-info">
          <div class="sub-name">${s.name}${soon ? '<span class="badge-soon">скоро</span>' : ''}</div>
          <div class="sub-date">Списание ${s.day}-го числа · через ${daysLeft} дн.</div>
        </div>
        <div style="text-align:right">
          <div class="sub-amount">${fmt(s.amount)}</div>
          <div style="font-size:11px;color:#ccc;cursor:pointer;margin-top:4px" onclick="deleteSubscription(${s.id})">✕</div>
        </div>
      </div>`;
    });
    list.innerHTML = html;
  }

  function renderAnalytics() {
    const monthTx = getMonthTransactions();
    const income = monthTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const expense = monthTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const balance = income - expense;
    const subTotal = subscriptions.reduce((s,sub)=>s+sub.amount,0);

    document.getElementById('totalIncome').textContent = fmt(income);
    document.getElementById('totalExpense').textContent = fmt(expense);
    const balEl = document.getElementById('analyticsBalance');
    balEl.textContent = (balance >= 0 ? '+' : '') + fmt(balance);
    balEl.style.color = balance >= 0 ? '#34C759' : '#FF3B30';
    document.getElementById('totalSubs').textContent = fmt(subTotal);

    // График по категориям
    const cats = {};
    monthTx.filter(t=>t.type==='expense').forEach(t => {
      cats[t.category] = (cats[t.category] || 0) + t.amount;
    });

    const chart = document.getElementById('categoryChart');
    if (Object.keys(cats).length === 0) {
      chart.innerHTML = '<div class="empty"><div class="empty-text">Расходов пока нет</div></div>';
      return;
    }

    const max = Math.max(...Object.values(cats));
    let html = '';
    Object.entries(cats).sort((a,b)=>b[1]-a[1]).forEach(([cat, amt]) => {
      const pct = max > 0 ? (amt/max*100).toFixed(0) : 0;
      html += `<div class="category-row">
        <div class="cat-name">${cat}</div>
        <div class="cat-bar-wrap"><div class="cat-bar" style="width:${pct}%"></div></div>
        <div class="cat-amount">${fmt(amt)}</div>
      </div>`;
    });
    chart.innerHTML = html;
  }

  function renderBalance() {
    const monthTx = getMonthTransactions();
    const income = monthTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const expense = monthTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const balance = income - expense;
    const el = document.getElementById('balanceDisplay');
    el.textContent = (balance >= 0 ? '+' : '') + fmt(balance);
    el.className = 'balance-block ' + (balance >= 0 ? 'positive' : 'negative');
  }

  function renderAll() {
    renderBalance();
    renderTransactions();
    renderSubscriptions();
    renderAnalytics();
  }

  renderAll();
</script>
</body>
</html>
